<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Second Brain AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0f0f1a;
            color: white;
        }
        .navbar {
            background: #1a1a2e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { color: #7c7cff; }
        .nav-links a {
            color: #aaa;
            text-decoration: none;
            margin-left: 20px;
        }
        .nav-links a:hover { color: #7c7cff; }
        .main { padding: 40px; }
        h2 { color: #7c7cff; margin-bottom: 20px; }
        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background: #1a1a2e;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }
        .card h3 { font-size: 32px; color: #7c7cff; }
        .card p { color: #aaa; margin-top: 5px; }
        .section {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h3 {
            color: #7c7cff;
            margin-bottom: 15px;
        }
        .file-item {
            padding: 10px;
            border-bottom: 1px solid #333;
            color: #ccc;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: #7c7cff;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            margin-right: 10px;
            margin-top: 20px;
        }
        .logout { color: #ff4c4c !important; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🧠 Second Brain AI</h1>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/upload">Upload</a>
            <a href="/chat">Chat</a>
            <a href="/logout" class="logout">Logout</a>
        </div>
    </div>
    <div class="main">
        <h2>Welcome, {{ user_name }}! 👋</h2>
        <div class="cards">
            <div class="card">
                <h3 id="fileCount">...</h3>
                <p>Files Uploaded</p>
            </div>
            <div class="card">
                <h3>✅</h3>
                <p>AI Connected</p>
            </div>
            <div class="card">
                <h3>🔒</h3>
                <p>Secured Login</p>
            </div>
        </div>
        <div class="section">
            <h3>📁 Your Uploaded Files</h3>
            <div id="filesList">
                <p style="color:#aaa">Loading...</p>
            </div>
        </div>
        <a href="/upload" class="btn">📤 Upload Notes</a>
        <a href="/chat" class="btn">💬 Ask AI</a>
    </div>
    <script>
        async function loadDashboard() {
            try {
                const res = await fetch("/files");
                const files = await res.json();
                document.getElementById("fileCount")
                    .textContent = files.length;
                const list = document.getElementById("filesList");
                if (files.length === 0) {
                    list.innerHTML =
                        '<p style="color:#aaa">No files yet. ' +
                        '<a href="/upload" style="color:#7c7cff">' +
                        'Upload now</a></p>';
                } else {
                    list.innerHTML = files.map(f =>
                        `<div class="file-item">
                            📄 ${f.filename}
                        </div>`
                    ).join("");
                }
            } catch(e) {
                document.getElementById("fileCount")
                    .textContent = "0";
            }
        }
        loadDashboard();
    </script>
</body>
</html>
